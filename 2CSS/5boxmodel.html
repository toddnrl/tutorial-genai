<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #my_bg_orange {
            background-color: orange;
        }
        .my_bg_yellow {
            border: 2px groove red; /*solid, dotted, double*/
            background-color: yellow;
        }
        .my_text_blue {
            color: blue;
        }
        .my_text_pink {
            color: pink;
        }

        p {
            color: green;
        }
    </style>
</head>
<body>
    <h1>css 연습</h1>
    <p class="my_bg_yellow">여기는 아무 문장이나 적으시오</p>
    <p>여기는 아무 문장이나 적으시오</p>
    <p class="my_bg_yellow my_text_blue" id="my_bg_orange">여긴느 아무 문장이나 적으시오</p>
    <p class="my_text_pink my_text_blue">여기는 아무 문장이나 적으시오</p>
</body>
</html>
