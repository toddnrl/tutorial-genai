<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="todoInput">
    <button id="addBtn">추가</button>
    <ul id="list"></ul>

    <script>
        addBtn.onclick = () => {
        const li = document.createElement("li");
        li.innerText = todoInput.value;

        li.onclick = () => li.remove();

        list.appendChild(li);
        todoInput.value = "";
        };
    </script>
</html>
