<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            position: absolute;
        }

        .red {
            background: red;
            left: 0;
            top: 0;
            z-index: 1;
        }

        .blue {
            background: blue;
            left: 30px;
            top: 30px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="red"></div>
    <div class="blue"></div>
</body>
</html>
