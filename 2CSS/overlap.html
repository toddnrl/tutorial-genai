<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box {
          position: relative;
          width: 200px;
          height: 200px;
          background: gray;
        }
        
        .overlay {
          position: absolute;
          inset: 0;
          background: rgba(0,0,0,0.6);
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: -1;
          transition: 0.3s;
        }
        
        .box:hover .overlay {
          opacity: 1;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            z-index: 1000;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="overlay">INFO</div>
    </div>
    <div class="modal">팝업</div>
</body>
</html>
